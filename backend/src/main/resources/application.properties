# Server
server.port=${PORT:8080}

# Database (Render Postgres via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/portfolio_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASS:}}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false

# CORS (frontend URL)
app.cors.allowedOrigin=${FRONTEND_URL:http://localhost:5173}

# JWT + Admin
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32CHARS_MIN}
app.jwt.expMinutes=${JWT_EXP_MINUTES:120}
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASS:admin123}